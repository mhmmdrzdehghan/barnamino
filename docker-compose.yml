version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redisdata:/data

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/code
    ports:
      - "${WEB_PORT}:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env

volumes:
  pgdata:
  redisdata:
